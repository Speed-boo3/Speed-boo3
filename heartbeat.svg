<svg viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg" width="800" height="120">
  <rect width="800" height="120" fill="#0d1117" rx="10"/>

  <polyline
    points="0,60 60,60 80,60 100,20 120,100 140,10 160,100 180,60 220,60 240,60 300,60 320,60 340,20 360,100 380,10 400,100 420,60 460,60 480,60 540,60 560,60 580,20 600,100 620,10 640,100 660,60 700,60 720,60 800,60"
    fill="none"
    stroke="#00ff41"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <polyline
    points="0,60 60,60 80,60 100,20 120,100 140,10 160,100 180,60 220,60 240,60 300,60 320,60 340,20 360,100 380,10 400,100 420,60 460,60 480,60 540,60 560,60 580,20 600,100 620,10 640,100 660,60 700,60 720,60 800,60"
    fill="none"
    stroke="#00ff41"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="1600"
    stroke-dashoffset="1600"
    opacity="0.6"
  >
    <animate
      attributeName="stroke-dashoffset"
      from="1600"
      to="-1600"
      dur="3s"
      repeatCount="indefinite"
      calcMode="linear"
    />
  </polyline>

  <circle cx="0" cy="60" r="4" fill="#00ff41">
    <animateMotion
      dur="3s"
      repeatCount="indefinite"
      calcMode="linear"
    >
      <mpath>
        <path d="M0,60 L60,60 L80,60 L100,20 L120,100 L140,10 L160,100 L180,60 L220,60 L240,60 L300,60 L320,60 L340,20 L360,100 L380,10 L400,100 L420,60 L460,60 L480,60 L540,60 L560,60 L580,20 L600,100 L620,10 L640,100 L660,60 L700,60 L720,60 L800,60"/>
      </mpath>
    </animateMotion>
  </circle>

  <text x="400" y="115" text-anchor="middle" fill="#333" font-family="monospace" font-size="10">ACTIVITY</text>
</svg>
