<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" width="700" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="700" height="200" fill="#0d1117" rx="12"/>
  <rect x="0" y="0" width="700" height="32" fill="#161b22" rx="12"/>
  <rect x="0" y="20" width="700" height="12" fill="#161b22"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="16" r="6" fill="#27c93f"/>
  <text x="350" y="21" text-anchor="middle" fill="#555" font-family="JetBrains Mono,monospace" font-size="11">soc-scanner — live</text>

  <!-- Scan line sweeping -->
  <rect x="0" y="32" width="700" height="3" fill="rgba(0,255,65,0.15)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,165;0,0" dur="3s" repeatCount="indefinite" calcMode="ease-in-out"/>
  </rect>

  <!-- Static terminal lines -->
  <text x="18" y="58" fill="#555" font-family="JetBrains Mono,monospace" font-size="11">$</text>
  <text x="30" y="58" fill="#00ff41" font-family="JetBrains Mono,monospace" font-size="11">python soc/log-parser/parser.py --file sample.log</text>

  <text x="18" y="76" fill="#555" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    Parsing...
    <animate attributeName="opacity" values="0;1" begin="0.4s" dur="0.1s" fill="freeze"/>
  </text>
  <text x="30" y="76" fill="#888" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    Total entries: 19  |  Suspicious: 11
    <animate attributeName="opacity" values="0;1" begin="0.4s" dur="0.1s" fill="freeze"/>
  </text>

  <text x="18" y="100" fill="#555" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    $
    <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.1s" fill="freeze"/>
  </text>
  <text x="30" y="100" fill="#00ff41" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    python soc/alert-rules/alert_engine.py --logs parsed.json
    <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.1s" fill="freeze"/>
  </text>

  <!-- Alert lines that appear one by one -->
  <rect x="16" y="110" width="668" height="20" rx="4" fill="rgba(255,68,68,0.07)" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.2s" dur="0.2s" fill="freeze"/>
  </rect>
  <text x="24" y="124" fill="#ff4444" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" opacity="0">
    [HIGH]  T1110 - Brute Force (Credential Access) — 45.33.32.156
    <animate attributeName="opacity" values="0;1" begin="1.2s" dur="0.2s" fill="freeze"/>
  </text>

  <rect x="16" y="132" width="668" height="20" rx="4" fill="rgba(255,136,0,0.07)" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.6s" dur="0.2s" fill="freeze"/>
  </rect>
  <text x="24" y="146" fill="#ff8800" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    [MED]   T1078 - Valid Accounts (Privilege Escalation) — sudo failure
    <animate attributeName="opacity" values="0;1" begin="1.6s" dur="0.2s" fill="freeze"/>
  </text>

  <rect x="16" y="154" width="668" height="20" rx="4" fill="rgba(255,204,0,0.07)" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="2s" dur="0.2s" fill="freeze"/>
  </rect>
  <text x="24" y="168" fill="#ffcc00" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    [MED]   T1203 - Client Exploitation (Execution) — segfault detected
    <animate attributeName="opacity" values="0;1" begin="2s" dur="0.2s" fill="freeze"/>
  </text>

  <text x="18" y="190" fill="#555" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    $
    <animate attributeName="opacity" values="0;1" begin="2.4s" dur="0.1s" fill="freeze"/>
  </text>
  <!-- Blinking cursor -->
  <rect x="28" y="180" width="8" height="14" fill="#00ff41" opacity="0">
    <animate attributeName="opacity" values="0;0;0;1" begin="2.4s" dur="0.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0" begin="2.5s" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
