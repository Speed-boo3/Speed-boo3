<svg viewBox="0 0 800 210" xmlns="http://www.w3.org/2000/svg" width="800" height="210">
  <rect width="800" height="210" fill="#0d1117" rx="12"/>
  <rect width="800" height="32" fill="#161b22" rx="12"/>
  <rect y="20" width="800" height="12" fill="#161b22"/>
  <circle cx="20" cy="16" r="5.5" fill="#ff5f56"/>
  <circle cx="40" cy="16" r="5.5" fill="#ffbd2e"/>
  <circle cx="60" cy="16" r="5.5" fill="#27c93f"/>
  <text x="400" y="20" text-anchor="middle" fill="#444" font-family="JetBrains Mono,monospace" font-size="10">soc-pipeline — real output</text>

  <!-- Scan sweep -->
  <rect x="0" y="32" width="800" height="2" fill="rgba(0,255,65,0.12)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,175;0,0" dur="3.5s" repeatCount="indefinite" calcMode="ease-in-out"/>
  </rect>

  <!-- Line 1 -->
  <text x="20" y="58" fill="#555" font-family="JetBrains Mono,monospace" font-size="11">$</text>
  <text x="32" y="58" fill="#00ff41" font-family="JetBrains Mono,monospace" font-size="11">python soc/log-parser/generate_logs.py</text>

  <text x="20" y="74" fill="#666" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    Generated 22 log lines → sample.log
    <animate attributeName="opacity" values="0;1" begin="0.4s" dur="0.1s" fill="freeze"/>
  </text>

  <text x="20" y="94" fill="#555" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    $
    <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.1s" fill="freeze"/>
  </text>
  <text x="32" y="94" fill="#00ff41" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    python soc/alert-rules/alert_engine.py --logs parsed.json --rules rules.yaml
    <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.1s" fill="freeze"/>
  </text>

  <!-- Alert 1 -->
  <rect x="16" y="102" width="768" height="24" rx="4" fill="rgba(255,68,68,0.07)" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.3s" dur="0.2s" fill="freeze"/>
  </rect>
  <text x="24" y="118" fill="#ff4444" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" opacity="0">
    [HIGH]
    <animate attributeName="opacity" values="0;1" begin="1.3s" dur="0.2s" fill="freeze"/>
  </text>
  <text x="78" y="118" fill="#ccc" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    RULE-001 · T1110 Brute Force · 45.33.32.156 · 9 attempts in 120s · AbuseIPDB 97%
    <animate attributeName="opacity" values="0;1" begin="1.3s" dur="0.2s" fill="freeze"/>
  </text>

  <!-- Alert 2 -->
  <rect x="16" y="128" width="768" height="24" rx="4" fill="rgba(255,136,0,0.06)" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.7s" dur="0.2s" fill="freeze"/>
  </rect>
  <text x="24" y="144" fill="#ff8800" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" opacity="0">
    [MEDIUM]
    <animate attributeName="opacity" values="0;1" begin="1.7s" dur="0.2s" fill="freeze"/>
  </text>
  <text x="92" y="144" fill="#ccc" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    RULE-003 · T1078 Valid Accounts · pam_unix(sudo:auth): authentication failure uid=1003
    <animate attributeName="opacity" values="0;1" begin="1.7s" dur="0.2s" fill="freeze"/>
  </text>

  <!-- Alert 3 -->
  <rect x="16" y="154" width="768" height="24" rx="4" fill="rgba(255,204,0,0.05)" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="2.1s" dur="0.2s" fill="freeze"/>
  </rect>
  <text x="24" y="170" fill="#ffcc00" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" opacity="0">
    [MEDIUM]
    <animate attributeName="opacity" values="0;1" begin="2.1s" dur="0.2s" fill="freeze"/>
  </text>
  <text x="92" y="170" fill="#ccc" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    RULE-006 · T1203 Client Execution · segfault at 0x0 ip 00007f — pid 4821
    <animate attributeName="opacity" values="0;1" begin="2.1s" dur="0.2s" fill="freeze"/>
  </text>

  <!-- Done -->
  <rect x="16" y="180" width="768" height="22" rx="4" fill="rgba(0,255,65,0.05)" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="2.5s" dur="0.3s" fill="freeze"/>
  </rect>
  <text x="24" y="195" fill="#00ff41" font-family="JetBrains Mono,monospace" font-size="11" opacity="0">
    ✓  3 alerts written to alerts.log — Daily scan complete 07:00 UTC
    <animate attributeName="opacity" values="0;1" begin="2.5s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="20" y="200" width="7" height="2" fill="#00ff41" opacity="0">
    <animate attributeName="opacity" values="0;0;1" begin="2.6s" dur="0.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" begin="2.7s" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
