<svg viewBox="0 0 700 100" xmlns="http://www.w3.org/2000/svg" width="700" height="100">
  <rect width="700" height="100" fill="#0d1117" rx="10"/>

  <text x="20" y="22" fill="#555" font-family="JetBrains Mono,monospace" font-size="9" letter-spacing="2">GRC RISK REGISTER — LIVE SCORES</text>

  <!-- Risk bars -->
  <!-- Phishing -->
  <text x="20" y="44" fill="#888" font-family="JetBrains Mono,monospace" font-size="10">Phishing attack</text>
  <rect x="160" y="32" width="220" height="14" rx="3" fill="#1a0505"/>
  <rect x="160" y="32" width="0" height="14" rx="3" fill="#ff4444">
    <animate attributeName="width" values="0;176" dur="1.5s" fill="freeze" calcMode="ease-out"/>
  </rect>
  <text x="392" y="44" fill="#ff4444" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">20 CRITICAL</text>

  <!-- Unpatched -->
  <text x="20" y="64" fill="#888" font-family="JetBrains Mono,monospace" font-size="10">Unpatched systems</text>
  <rect x="160" y="52" width="220" height="14" rx="3" fill="#1a0505"/>
  <rect x="160" y="52" width="0" height="14" rx="3" fill="#ff8800">
    <animate attributeName="width" values="0;132" dur="1.5s" begin="0.3s" fill="freeze" calcMode="ease-out"/>
  </rect>
  <text x="392" y="64" fill="#ff8800" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">15 HIGH</text>

  <!-- Insider -->
  <text x="20" y="84" fill="#888" font-family="JetBrains Mono,monospace" font-size="10">Insider threat</text>
  <rect x="160" y="72" width="220" height="14" rx="3" fill="#1a0a00"/>
  <rect x="160" y="72" width="0" height="14" rx="3" fill="#ffcc00">
    <animate attributeName="width" values="0;88" dur="1.5s" begin="0.6s" fill="freeze" calcMode="ease-out"/>
  </rect>
  <text x="392" y="84" fill="#ffcc00" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">10 HIGH</text>

  <!-- Right side decorative -->
  <text x="520" y="44" fill="#444" font-family="JetBrains Mono,monospace" font-size="9">likelihood × impact</text>
  <text x="520" y="62" fill="#333" font-family="JetBrains Mono,monospace" font-size="9">ISO 27001 / NIST CSF</text>
  <text x="520" y="80" fill="#333" font-family="JetBrains Mono,monospace" font-size="9">6 risks tracked</text>

  <!-- Pulsing dot -->
  <circle cx="680" cy="50" r="6" fill="#ff4444" opacity="0.8">
    <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="660" y="75" fill="#333" font-family="JetBrains Mono,monospace" font-size="8">LIVE</text>
</svg>
