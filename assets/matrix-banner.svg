<svg viewBox="0 0 700 120" xmlns="http://www.w3.org/2000/svg" width="700" height="120">
  <rect width="700" height="120" fill="#0a0f0a" rx="10"/>

  <!-- Matrix rain columns -->
  <g font-family="JetBrains Mono,monospace" font-size="12" fill="#00ff41">

    <!-- Column 1 -->
    <text x="10" opacity="0.9"><animate attributeName="y" values="-20;140" dur="2.1s" repeatCount="indefinite"/><tspan>1</tspan></text>
    <text x="10" opacity="0.5"><animate attributeName="y" values="-50;140" dur="2.1s" repeatCount="indefinite"/><tspan>0</tspan></text>
    <text x="10" opacity="0.2"><animate attributeName="y" values="-80;140" dur="2.1s" repeatCount="indefinite"/><tspan>S</tspan></text>

    <!-- Column 2 -->
    <text x="30" opacity="0.9"><animate attributeName="y" values="-20;140" dur="1.7s" begin="0.3s" repeatCount="indefinite"/><tspan>O</tspan></text>
    <text x="30" opacity="0.4"><animate attributeName="y" values="-50;140" dur="1.7s" begin="0.3s" repeatCount="indefinite"/><tspan>1</tspan></text>

    <!-- Column 3 -->
    <text x="50" opacity="0.9"><animate attributeName="y" values="-20;140" dur="2.4s" begin="0.6s" repeatCount="indefinite"/><tspan>C</tspan></text>
    <text x="50" opacity="0.5"><animate attributeName="y" values="-50;140" dur="2.4s" begin="0.6s" repeatCount="indefinite"/><tspan>0</tspan></text>
    <text x="50" opacity="0.2"><animate attributeName="y" values="-90;140" dur="2.4s" begin="0.6s" repeatCount="indefinite"/><tspan>1</tspan></text>

    <!-- Column 4 -->
    <text x="70" opacity="0.8"><animate attributeName="y" values="-20;140" dur="1.9s" begin="0.9s" repeatCount="indefinite"/><tspan>G</tspan></text>
    <text x="70" opacity="0.3"><animate attributeName="y" values="-60;140" dur="1.9s" begin="0.9s" repeatCount="indefinite"/><tspan>R</tspan></text>

    <!-- Column 5 -->
    <text x="90" opacity="0.9"><animate attributeName="y" values="-20;140" dur="2.2s" begin="0.2s" repeatCount="indefinite"/><tspan>C</tspan></text>
    <text x="90" opacity="0.4"><animate attributeName="y" values="-50;140" dur="2.2s" begin="0.2s" repeatCount="indefinite"/><tspan>1</tspan></text>

    <!-- More columns right side -->
    <text x="590" opacity="0.9"><animate attributeName="y" values="-20;140" dur="2s" begin="0.5s" repeatCount="indefinite"/><tspan>0</tspan></text>
    <text x="590" opacity="0.4"><animate attributeName="y" values="-60;140" dur="2s" begin="0.5s" repeatCount="indefinite"/><tspan>1</tspan></text>
    <text x="610" opacity="0.8"><animate attributeName="y" values="-20;140" dur="1.8s" begin="0.8s" repeatCount="indefinite"/><tspan>S</tspan></text>
    <text x="630" opacity="0.9"><animate attributeName="y" values="-20;140" dur="2.3s" begin="0.1s" repeatCount="indefinite"/><tspan>1</tspan></text>
    <text x="630" opacity="0.3"><animate attributeName="y" values="-55;140" dur="2.3s" begin="0.1s" repeatCount="indefinite"/><tspan>0</tspan></text>
    <text x="650" opacity="0.7"><animate attributeName="y" values="-20;140" dur="1.6s" begin="0.4s" repeatCount="indefinite"/><tspan>C</tspan></text>
    <text x="670" opacity="0.9"><animate attributeName="y" values="-20;140" dur="2.0s" begin="0.7s" repeatCount="indefinite"/><tspan>0</tspan></text>
    <text x="670" opacity="0.4"><animate attributeName="y" values="-55;140" dur="2.0s" begin="0.7s" repeatCount="indefinite"/><tspan>1</tspan></text>
  </g>

  <!-- Central text overlay -->
  <rect x="120" y="20" width="460" height="80" rx="8" fill="rgba(13,17,23,0.88)"/>
  <rect x="120" y="20" width="460" height="80" rx="8" fill="none" stroke="rgba(0,255,65,0.2)" stroke-width="1"/>

  <text x="350" y="56" text-anchor="middle" fill="#00ff41" font-family="JetBrains Mono,monospace" font-size="22" font-weight="700" filter="url(#glow2)">SUKHBIR</text>
  <text x="350" y="78" text-anchor="middle" fill="#555" font-family="JetBrains Mono,monospace" font-size="11" letter-spacing="3">CYBERSECURITY ENGINEER</text>

  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
