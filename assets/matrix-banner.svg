<svg viewBox="0 0 800 130" xmlns="http://www.w3.org/2000/svg" width="800" height="130">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="fade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="15%" stop-color="transparent"/>
      <stop offset="85%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="800" height="130" fill="#060d06"/>

  <!-- Matrix columns -->
  <g font-family="JetBrains Mono,monospace" font-size="13" fill="#00ff41">
    <text x="12"><animate attributeName="y" values="-10;140" dur="2.2s" repeatCount="indefinite"/><tspan opacity=".9">S</tspan></text>
    <text x="12" opacity=".3"><animate attributeName="y" values="-40;140" dur="2.2s" repeatCount="indefinite"/><tspan>0</tspan></text>
    <text x="32"><animate attributeName="y" values="-10;140" dur="1.8s" begin=".3s" repeatCount="indefinite"/><tspan opacity=".9">O</tspan></text>
    <text x="32" opacity=".3"><animate attributeName="y" values="-45;140" dur="1.8s" begin=".3s" repeatCount="indefinite"/><tspan>1</tspan></text>
    <text x="52"><animate attributeName="y" values="-10;140" dur="2.5s" begin=".6s" repeatCount="indefinite"/><tspan opacity=".9">C</tspan></text>
    <text x="72"><animate attributeName="y" values="-10;140" dur="2.0s" begin=".9s" repeatCount="indefinite"/><tspan opacity=".8">1</tspan></text>
    <text x="92"><animate attributeName="y" values="-10;140" dur="1.6s" begin=".1s" repeatCount="indefinite"/><tspan opacity=".6">0</tspan></text>
    <text x="112"><animate attributeName="y" values="-10;140" dur="2.3s" begin=".4s" repeatCount="indefinite"/><tspan opacity=".9">G</tspan></text>
    <text x="112" opacity=".25"><animate attributeName="y" values="-50;140" dur="2.3s" begin=".4s" repeatCount="indefinite"/><tspan>R</tspan></text>
    <text x="132"><animate attributeName="y" values="-10;140" dur="1.9s" begin=".7s" repeatCount="indefinite"/><tspan opacity=".7">C</tspan></text>

    <text x="648"><animate attributeName="y" values="-10;140" dur="2.1s" begin=".2s" repeatCount="indefinite"/><tspan opacity=".9">0</tspan></text>
    <text x="668"><animate attributeName="y" values="-10;140" dur="1.7s" begin=".5s" repeatCount="indefinite"/><tspan opacity=".8">1</tspan></text>
    <text x="688"><animate attributeName="y" values="-10;140" dur="2.4s" begin=".8s" repeatCount="indefinite"/><tspan opacity=".6">S</tspan></text>
    <text x="708"><animate attributeName="y" values="-10;140" dur="2.0s" begin=".1s" repeatCount="indefinite"/><tspan opacity=".9">O</tspan></text>
    <text x="728"><animate attributeName="y" values="-10;140" dur="1.8s" begin=".6s" repeatCount="indefinite"/><tspan opacity=".7">C</tspan></text>
    <text x="748"><animate attributeName="y" values="-10;140" dur="2.2s" begin=".3s" repeatCount="indefinite"/><tspan opacity=".5">1</tspan></text>
    <text x="768"><animate attributeName="y" values="-10;140" dur="1.6s" begin=".9s" repeatCount="indefinite"/><tspan opacity=".9">0</tspan></text>
  </g>

  <!-- Centre card -->
  <rect x="155" y="18" width="490" height="94" rx="10" fill="rgba(6,13,6,0.92)"/>
  <rect x="155" y="18" width="490" height="94" rx="10" fill="none" stroke="rgba(0,255,65,0.18)" stroke-width="1"/>

  <!-- Left accent line -->
  <rect x="155" y="18" width="3" height="94" rx="2" fill="#00ff41">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <text x="400" y="64" text-anchor="middle" fill="#00ff41" font-family="JetBrains Mono,monospace" font-size="26" font-weight="700" letter-spacing="6" filter="url(#glow)">SUKHBIR</text>
  <text x="400" y="84" text-anchor="middle" fill="#2a4a2a" font-family="JetBrains Mono,monospace" font-size="10" letter-spacing="5">CYBERSECURITY ENGINEER</text>

  <!-- Fade overlay -->
  <rect width="800" height="130" fill="url(#fade)"/>
</svg>
