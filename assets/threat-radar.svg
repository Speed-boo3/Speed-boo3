<svg viewBox="0 0 800 170" xmlns="http://www.w3.org/2000/svg" width="800" height="170">
  <rect width="800" height="170" fill="#0d1117" rx="12"/>

  <!-- Radar -->
  <g transform="translate(110,85)">
    <circle cx="0" cy="0" r="62" fill="none" stroke="rgba(0,255,65,0.08)" stroke-width="1"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="rgba(0,255,65,0.10)" stroke-width="1"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="rgba(0,255,65,0.14)" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(0,255,65,0.2)" stroke-width="1"/>
    <line x1="-62" y1="0" x2="62" y2="0" stroke="rgba(0,255,65,0.07)" stroke-width="1"/>
    <line x1="0" y1="-62" x2="0" y2="62" stroke="rgba(0,255,65,0.07)" stroke-width="1"/>
    <line x1="-44" y1="-44" x2="44" y2="44" stroke="rgba(0,255,65,0.05)" stroke-width="1"/>
    <line x1="44" y1="-44" x2="-44" y2="44" stroke="rgba(0,255,65,0.05)" stroke-width="1"/>

    <!-- Sweep -->
    <path d="M0,0 L62,0 A62,62 0 0,0 0,-62 Z" fill="rgba(0,255,65,0.06)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- Threat blips -->
    <circle cx="32" cy="-20" r="4" fill="#ff4444" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-38" cy="14" r="3.5" fill="#ff8800" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="16" cy="48" r="3" fill="#ffcc00" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="2.1s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="80" text-anchor="middle" fill="#2a3a2a" font-family="JetBrains Mono,monospace" font-size="8" letter-spacing="1">THREAT RADAR</text>
  </g>

  <!-- Divider -->
  <line x1="196" y1="20" x2="196" y2="150" stroke="#1e2d1e" stroke-width="1"/>

  <!-- Alert feed -->
  <text x="216" y="34" fill="#2a4a2a" font-family="JetBrains Mono,monospace" font-size="8" letter-spacing="2">LIVE INTEL FEED</text>

  <rect x="212" y="42" width="572" height="22" rx="4" fill="rgba(255,68,68,0.08)" stroke="rgba(255,68,68,0.18)" stroke-width="1">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
