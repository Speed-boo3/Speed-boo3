  <text x="222" y="57" fill="#ff4444" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">[CRITICAL]</text>
  <text x="294" y="57" fill="#bbb" font-family="JetBrains Mono,monospace" font-size="10">SSH Brute Force · 45.33.32.156 · T1110 · AbuseIPDB 97%</text>

  <rect x="212" y="70" width="572" height="22" rx="4" fill="rgba(255,136,0,0.06)" stroke="rgba(255,136,0,0.14)" stroke-width="1"/>
  <text x="222" y="85" fill="#ff8800" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">[HIGH]</text>
  <text x="266" y="85" fill="#bbb" font-family="JetBrains Mono,monospace" font-size="10">Credential Stuffing · /login · T1110.004 · 185.220.101.45</text>

  <rect x="212" y="98" width="572" height="22" rx="4" fill="rgba(255,204,0,0.05)" stroke="rgba(255,204,0,0.12)" stroke-width="1"/>
  <text x="222" y="113" fill="#ffcc00" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">[MEDIUM]</text>
  <text x="286" y="113" fill="#bbb" font-family="JetBrains Mono,monospace" font-size="10">Sudo failure uid=1003 · T1078 · Privilege Escalation</text>

  <rect x="212" y="126" width="572" height="22" rx="4" fill="rgba(41,121,255,0.05)" stroke="rgba(41,121,255,0.12)" stroke-width="1"/>
  <text x="222" y="141" fill="#4488ff" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700">[GRC]</text>
  <text x="258" y="141" fill="#bbb" font-family="JetBrains Mono,monospace" font-size="10">Risk register — phishing RISK-002 raised to Critical · score 20</text>

  <rect x="212" y="148" width="572" height="16" rx="3" fill="rgba(0,255,65,0.04)">
    <animate attributeName="opacity" values="0;1;1;0" dur="5s" repeatCount="indefinite"/>
  </rect>
  <text x="222" y="160" fill="#00ff41" font-family="JetBrains Mono,monospace" font-size="9" opacity="0">
    [INFO] Daily pipeline complete · alerts.log updated · GitHub Actions · 07:00 UTC
    <animate attributeName="opacity" values="0;1;1;0" dur="5s" repeatCount="indefinite"/>
  </text>
</svg>
